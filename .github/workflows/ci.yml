name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest  # Указываем Windows

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.14'  # Укажите вашу версию Python

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt  # Убедитесь, что pytest указан в requirements.txt

    - name: Run tests
      run: |
        pytest  # Запускаем ваши тесты
